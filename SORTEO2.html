<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sorteo del Cuadro</title>

<style>

body{
    margin:0;
    padding:20px;
    background:#111;
    font-family:Arial, sans-serif;
    color:white;
    text-align:center;
}

#contenedor{
    max-width:1000px;
    margin:auto;
    background:#1b1b1b;
    padding:25px;
    border-radius:20px;
    box-shadow:0 0 20px rgba(0,0,0,0.5);
}

h1{
    color:#ff7b00;
    margin-bottom:10px;
}

p{
    color:#ccc;
}

.grid{
    display:grid;
    grid-template-columns:repeat(10,1fr);
    gap:10px;
    margin-top:30px;
}

.numero{
    background:#222;
    border:2px solid #444;
    border-radius:12px;
    padding:18px 0;
    cursor:pointer;
    transition:0.25s;
    font-size:18px;
    font-weight:bold;
}

.numero:hover{
    background:#ff7b00;
    color:black;
    transform:scale(1.05);
}

table{
    width:100%;
    margin-top:35px;
    border-collapse:collapse;
}

th{
    background:#ff7b00;
    color:black;
    padding:12px;
}

td{
    border:1px solid #333;
    padding:10px;
}

.admin{
    margin-top:30px;
}

input{
    padding:12px;
    border:none;
    border-radius:10px;
    width:220px;
    margin-bottom:10px;
}

button{
    padding:12px 18px;
    border:none;
    border-radius:10px;
    background:#ff7b00;
    color:black;
    font-weight:bold;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    transform:scale(1.05);
}

#contador{
    margin-top:20px;
    font-size:20px;
    color:#ffb347;
}

#mensaje{
    margin-top:25px;
    background:#222;
    padding:15px;
    border-radius:12px;
    color:#ffcc80;
    line-height:1.6;
}

</style>

</head>

<body>

<div id="contenedor">

<h1>🎨 SORTEO DEL CUADRO 🎨</h1>

<p>
Elegí tu número por solo <b>$1000</b>
</p>

<div id="contador"></div>

<div class="grid" id="grid"></div>

<div id="mensaje">

📲 Luego de reservar el número, enviar comprobante de pago para confirmar participación.

</div>

<table>

<thead>
<tr>
<th>Número</th>
<th>Nombre</th>
</tr>
</thead>

<tbody id="lista"></tbody>

</table>

<div class="admin">

<h3>Administrador</h3>

<input 
type="password" 
id="codigo" 
placeholder="Código administrador"
>

<br>

<button onclick="reiniciarSorteo()">
Reiniciar Sorteo
</button>

</div>

</div>

<script>

// =============================
// CODIGO ADMINISTRADOR
// =============================

const CODIGO = "182044";

// =============================

const grid = document.getElementById("grid");

const lista = document.getElementById("lista");

const contador = document.getElementById("contador");

let sorteo = JSON.parse(
    localStorage.getItem("sorteo")
) || [];

function guardarDatos(){

    localStorage.setItem(
        "sorteo",
        JSON.stringify(sorteo)
    );
}

function actualizarContador(){

    let disponibles = 100 - sorteo.length;

    contador.innerHTML =
        "🎟️ Quedan <b>" +
        disponibles +
        "</b> números disponibles";
}

function cargarNumeros(){

    grid.innerHTML = "";

    lista.innerHTML = "";

    actualizarContador();

    for(let i=0;i<=99;i++){

        let texto = i
            .toString()
            .padStart(2,"0");

        let ocupado = sorteo.find(
            n => n.numero === texto
        );

        // SI ESTA OCUPADO
        if(ocupado){

            let fila = `
            <tr>
                <td>${texto}</td>
                <td>${ocupado.nombre}</td>
            </tr>
            `;

            lista.innerHTML += fila;

            continue;
        }

        // SI ESTA LIBRE

        let div = document.createElement("div");

        div.classList.add("numero");

        div.innerText = texto;

        div.onclick = ()=>{

            let nombre = prompt(
                "Ingrese su nombre completo y dni:"
            );

            if(!nombre) return;

            nombre = nombre.trim();

            if(nombre.length < 2){

                alert("Nombre inválido");

                return;
            }

            let confirmar = confirm(
                "¿Confirmar reserva del número " +
                texto +
                "?"
            );

            if(!confirmar) return;

            sorteo.push({

                numero:texto,

                nombre:nombre
            });

            guardarDatos();

            cargarNumeros();

            alert(
                "✅ Número reservado correctamente.\n\n" +
                "📲 Envíe comprobante de pago a 2615170499 para confirmar participación."
            );
        };

        grid.appendChild(div);
    }
}

function reiniciarSorteo(){

    let codigo = document
        .getElementById("codigo")
        .value
        .trim();

    if(codigo !== CODIGO){

        alert("❌ Código incorrecto");

        return;
    }

    let confirmar = confirm(
        "¿Seguro desea reiniciar TODO el sorteo?"
    );

    if(!confirmar) return;

    localStorage.removeItem("sorteo");

    sorteo = [];

    document.getElementById("codigo").value = "";

    cargarNumeros();

    alert("✅ Sorteo reiniciado correctamente");
}

cargarNumeros();

</script>

</body>

</html>
