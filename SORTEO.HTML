<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sorteo</title>

<style>

body{
    font-family:Arial;
    background:#111;
    color:white;
    text-align:center;
    padding:20px;
}

h1{
    color:#ff7b00;
}

.grid{
    display:grid;
    grid-template-columns:repeat(10,1fr);
    gap:8px;
    max-width:700px;
    margin:auto;
    margin-top:30px;
}

.numero{
    background:#222;
    padding:15px;
    border-radius:10px;
    cursor:pointer;
    border:2px solid #555;
}

.numero:hover{
    background:#ff7b00;
    color:black;
}

.ocupado{
    background:#666;
    color:#222;
    text-decoration:line-through;
    cursor:not-allowed;
}

</style>

</head>

<body>

<h1>🎨 SORTEO DEL CUADRO 🎨</h1>

<p>
Elegí tu número por solo $1000
</p>

<div class="grid" id="grid"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
    getFirestore,
    collection,
    getDocs,
    setDoc,
    doc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


// PEGA ACA TU CONFIG REAL
const firebaseConfig = {

    apiKey: "ACA",

    authDomain: "ACA",

    projectId: "ACA",

    storageBucket: "ACA",

    messagingSenderId: "ACA",

    appId: "ACA"
};


const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const grid = document.getElementById("grid");


async function cargar(){

    const snapshot = await getDocs(collection(db,"sorteo"));

    let ocupados = {};

    snapshot.forEach((d)=>{

        ocupados[d.id] = d.data().nombre;
    });


    for(let i=0;i<=99;i++){

        let texto = i.toString().padStart(2,"0");

        let div = document.createElement("div");

        div.classList.add("numero");

        if(ocupados[texto]){

            div.classList.add("ocupado");

            div.innerHTML = texto + "<br><small>" + ocupados[texto] + "</small>";

        }else{

            div.innerHTML = texto;

            div.onclick = async ()=>{

                let nombre = prompt("Nombre:");

                if(!nombre) return;

                await setDoc(doc(db,"sorteo",texto),{

                    nombre:nombre
                });

                div.classList.add("ocupado");

                div.innerHTML = texto + "<br><small>" + nombre + "</small>";
            };
        }

        grid.appendChild(div);
    }
}

cargar();

</script>

</body>

</html>
